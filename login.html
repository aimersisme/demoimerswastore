<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk - iMersWAstore SaaS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- Container Utama -->
    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl border border-slate-100 overflow-hidden">
        
        <div class="p-8">
            <div class="text-center mb-8">
                <div class="w-12 h-12 rounded-xl bg-emerald-100 text-emerald-600 flex items-center justify-center mx-auto mb-4">
                    <i data-lucide="store" class="w-6 h-6"></i>
                </div>
                <h2 class="text-2xl font-bold text-slate-900" id="formTitle">Masuk ke Akun</h2>
                <p class="text-slate-500 text-sm mt-1" id="formSubtitle">Silakan masuk ke panel iMersWAstore Anda</p>
            </div>

            <!-- Pesan Error / Sukses -->
            <div id="alertBox" class="hidden mb-6 p-3 rounded-lg text-sm font-medium text-center"></div>

            <!-- FORM LOGIN -->
            <form id="loginForm" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Username</label>
                    <input type="text" id="username" required class="w-full px-4 py-2.5 rounded-lg border border-slate-200 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all">
                </div>
                <div>
                    <div class="flex justify-between items-center mb-1">
                        <label class="block text-sm font-medium text-slate-700">Password</label>
                        <button type="button" onclick="toggleForm('forgot')" class="text-xs text-emerald-600 hover:text-emerald-700 font-medium">Lupa password?</button>
                    </div>
                    <input type="password" id="password" required class="w-full px-4 py-2.5 rounded-lg border border-slate-200 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all">
                </div>
                
                <button type="submit" id="btnLogin" class="w-full flex justify-center items-center py-3 px-4 rounded-xl text-sm font-bold text-white bg-emerald-500 hover:bg-emerald-600 focus:ring-4 focus:ring-emerald-100 transition-all shadow-md shadow-emerald-500/20">
                    <span id="btnLoginText">Masuk Sekarang</span>
                    <i data-lucide="loader-2" id="btnLoginLoader" class="w-5 h-5 ml-2 animate-spin hidden"></i>
                </button>
            </form>

            <!-- FORM LUPA PASSWORD (Awalnya Sembunyi) -->
            <form id="forgotForm" class="space-y-5 hidden">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Email Terdaftar</label>
                    <input type="email" id="resetEmail" required class="w-full px-4 py-2.5 rounded-lg border border-slate-200 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all" placeholder="email@anda.com">
                </div>
                
                <button type="submit" id="btnForgot" class="w-full flex justify-center items-center py-3 px-4 rounded-xl text-sm font-bold text-white bg-slate-900 hover:bg-slate-800 transition-all shadow-md">
                    <span id="btnForgotText">Kirim Password Baru</span>
                    <i data-lucide="loader-2" id="btnForgotLoader" class="w-5 h-5 ml-2 animate-spin hidden"></i>
                </button>
                <div class="text-center">
                    <button type="button" onclick="toggleForm('login')" class="text-sm text-slate-500 hover:text-slate-700 font-medium">&larr; Kembali ke Login</button>
                </div>
            </form>

        </div>
        <div class="bg-slate-50 border-t border-slate-100 p-4 text-center">
            <p class="text-xs text-slate-500">Gunakan akun Dummy untuk demo:<br><b>admin / admin123</b> | <b>agency1 / agency123</b> | <b>user1 / user123</b></p>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // CEK SESI: Jika sudah login, tendang ke dashboard
        if (localStorage.getItem('iMersWA_User')) {
            window.location.href = 'dashboard.html';
        }

        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwKbN_R8gdRG5_jLniXD0LXZSMTUiU8gO5Ae-s3FAnfxV7gpaRstdovRiJbS_izuZeQpw/exec';

        // Toggle Form Login vs Lupa Password
        function toggleForm(type) {
            const loginForm = document.getElementById('loginForm');
            const forgotForm = document.getElementById('forgotForm');
            const formTitle = document.getElementById('formTitle');
            const formSubtitle = document.getElementById('formSubtitle');
            const alertBox = document.getElementById('alertBox');
            
            alertBox.classList.add('hidden'); // Sembunyikan alert saat ganti form

            if (type === 'forgot') {
                loginForm.classList.add('hidden');
                forgotForm.classList.remove('hidden');
                formTitle.innerText = "Lupa Password";
                formSubtitle.innerText = "Password baru akan dikirim ke email Anda";
            } else {
                forgotForm.classList.add('hidden');
                loginForm.classList.remove('hidden');
                formTitle.innerText = "Masuk ke Akun";
                formSubtitle.innerText = "Silakan masuk ke panel iMersWAstore Anda";
            }
        }

        // Tampilkan Notifikasi
        function showAlert(msg, isSuccess) {
            const alertBox = document.getElementById('alertBox');
            alertBox.innerText = msg;
            alertBox.className = `mb-6 p-3 rounded-lg text-sm font-medium text-center ${isSuccess ? 'bg-green-50 text-green-700 border border-green-200' : 'bg-red-50 text-red-700 border border-red-200'}`;
            alertBox.classList.remove('hidden');
        }

        // PROSES LOGIN
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const btnText = document.getElementById('btnLoginText');
            const btnLoader = document.getElementById('btnLoginLoader');
            const btnLogin = document.getElementById('btnLogin');
            
            // Set Loading UI
            btnLogin.disabled = true;
            btnText.innerText = "Memverifikasi...";
            btnLoader.classList.remove('hidden');
            
            const formData = new FormData();
            formData.append('action', 'login');
            formData.append('username', document.getElementById('username').value);
            formData.append('password', document.getElementById('password').value);

            fetch(SCRIPT_URL, { method: 'POST', body: formData })
                .then(res => res.json())
                .then(res => {
                    if (res.success) {
                        showAlert(res.message, true);
                        // Simpan Sesi di Browser
                        localStorage.setItem('iMersWA_User', JSON.stringify(res.data));
                        // Redirect
                        setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);
                    } else {
                        showAlert(res.message, false);
                        btnLogin.disabled = false;
                        btnText.innerText = "Masuk Sekarang";
                        btnLoader.classList.add('hidden');
                    }
                })
                .catch(err => {
                    showAlert("Terjadi kesalahan koneksi", false);
                    btnLogin.disabled = false;
                    btnText.innerText = "Masuk Sekarang";
                    btnLoader.classList.add('hidden');
                });
        });

        // PROSES LUPA PASSWORD
        document.getElementById('forgotForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const btnText = document.getElementById('btnForgotText');
            const btnLoader = document.getElementById('btnForgotLoader');
            const btnForgot = document.getElementById('btnForgot');
            
            btnForgot.disabled = true;
            btnText.innerText = "Mengirim Email...";
            btnLoader.classList.remove('hidden');
            
            const formData = new FormData();
            formData.append('action', 'forgot_password');
            formData.append('email', document.getElementById('resetEmail').value);

            fetch(SCRIPT_URL, { method: 'POST', body: formData })
                .then(res => res.json())
                .then(res => {
                    showAlert(res.message, res.success);
                    btnForgot.disabled = false;
                    btnText.innerText = "Kirim Password Baru";
                    btnLoader.classList.add('hidden');
                    if(res.success) document.getElementById('forgotForm').reset();
                })
                .catch(err => {
                    showAlert("Terjadi kesalahan koneksi", false);
                    btnForgot.disabled = false;
                    btnText.innerText = "Kirim Password Baru";
                    btnLoader.classList.add('hidden');
                });
        });
    </script>
</body>
</html>
